name: enos-agent-os

x-service-env: &service-env
  ENOS_DATABASE_URL: postgresql+asyncpg://enos:enos@postgres:5432/enos
  ENOS_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
  ENOS_RESULT_BACKEND: redis://redis:6379/0
  ENOS_ENVIRONMENT: test

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: enos
      POSTGRES_PASSWORD: enos
      POSTGRES_DB: enos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enos"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    command: ["api"]
    environment: *service-env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  mcp:
    build: .
    command: ["mcp"]
    environment: *service-env
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started  # api runs the migrations

  worker:
    build: .
    command: ["worker"]
    environment: *service-env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
